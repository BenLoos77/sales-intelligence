name: Daily Sales Intelligence

# Erzeugt jeden Morgen den Tagesschwerpunkt und veröffentlicht ihn direkt
# auf main (GitHub Pages deployt automatisch, ohne Freigabe).

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommerzeit) / 05:00 Berlin (Winterzeit).
    - cron: "0 4 * * *"
    # Fallback um 10:00 UTC (12:00 Berlin), falls GitHub den ersten Lauf
    # verschluckt. Der Generator ist idempotent — existiert der Beitrag
    # schon, passiert nichts.
    - cron: "0 10 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Auslösen über den Actions-Tab

permissions:
  contents: write

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r generator/requirements.txt

      - name: Artikel generieren
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generator/generate.py

      - name: Direkt auf main veröffentlichen
        env:
          ART_DATE: ${{ steps.gen.outputs.article_date }}
          ART_TITLE: ${{ steps.gen.outputs.article_title }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Keine Änderungen — heute existiert bereits ein Beitrag, nichts zu tun."
            exit 0
          fi
          git config user.name "Sales Intelligence Bot"
          git config user.email "kontakt@b77.de"
          git add -A
          git commit -m "Daily ${ART_DATE}: ${ART_TITLE}"
          git push
